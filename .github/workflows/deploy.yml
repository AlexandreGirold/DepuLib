name: Deploy to OVH

# Redéploie sur push main : SSH sur la VM → git pull + docker compose up.
on:
  push:
    branches: [main]
  workflow_dispatch: # bouton "Run workflow" manuel

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: debian
          key: ${{ secrets.VM_SSH_KEY }}
          script: bash /home/debian/depulib/infra/deploy.sh
