services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/depulib.db"
      UPLOAD_DIR: "/data/uploads"
      SESSION_SECRET: "${SESSION_SECRET:-depulib-poc-changez-moi-32-caracteres}"
      # true seulement derrière du HTTPS ; en HTTP nu, laisser vide (cookie non-Secure)
      COOKIE_SECURE: "${COOKIE_SECURE:-}"
      # RESEED=1 force le re-seed complet au démarrage (sinon seed seulement si base vide)
      RESEED: "${RESEED:-}"
      CLOUDTEMPLE_LLMAAS_API_KEY: "${CLOUDTEMPLE_LLMAAS_API_KEY:-}"
      CLOUDTEMPLE_LLMAAS_BASE_URL: "${CLOUDTEMPLE_LLMAAS_BASE_URL:-https://api.ai.cloud-temple.com/v1}"
      LLM_MODEL_MAIN: "${LLM_MODEL_MAIN:-mistral-small4:119b}"
      LLM_MODEL_FAST: "${LLM_MODEL_FAST:-mistral-small4:119b}"
      LLM_MODEL_EMBED: "${LLM_MODEL_EMBED:-bge-m3:567m}"
      LLM_TIMEOUT_MS: "${LLM_TIMEOUT_MS:-20000}"
      MCP_TRICOTEUSES_URL: "${MCP_TRICOTEUSES_URL:-https://www.tricoteuses.fr/mcp}"
      MCP_TIMEOUT_MS: "${MCP_TIMEOUT_MS:-15000}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_REGION: "${S3_REGION:-gra}"
      S3_BUCKET: "${S3_BUCKET:-depulib-documents}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-}"
      NEXT_PUBLIC_APP_NAME: "Depulib"
    volumes:
      - depulib-data:/data

volumes:
  depulib-data:
